<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- matthorrigan.com favicon: the walkable world's "hero slime" avatar, drawn as a
       cute gel dome looking DOWNWARD (pupils low, slight upper lids) toward the page.
       Colours mirror engine.js defPaintAvatar + theme-technurture avatarColors/avatarInk:
       brand green #4FA373, gel radial gradient (light core #B0D6C0 -> green -> dark rim
       #3A7955, = shade(0.55)/color/shade(-0.26)), white sheen, ink outline #1f3a1a. -->
  <defs>
    <radialGradient id="gel" gradientUnits="userSpaceOnUse" cx="16" cy="19" r="16" fx="12" fy="6">
      <stop offset="0" stop-color="#B0D6C0"/>
      <stop offset="0.5" stop-color="#4FA373"/>
      <stop offset="1" stop-color="#3A7955"/>
    </radialGradient>
  </defs>

  <!-- gel dome: flat-ish base, rounded crown -->
  <path d="M 4 27 C 4 14 8 5 16 5 C 24 5 28 14 28 27 Z"
        fill="url(#gel)" stroke="#1f3a1a" stroke-width="2" stroke-linejoin="round"/>

  <!-- bright gel sheen near the top-left -->
  <ellipse cx="12" cy="7" rx="2.6" ry="3.6" fill="#ffffff" opacity="0.32"
           transform="rotate(-28 12 7)"/>

  <!-- two friendly eyes high on the body, pupils LOW = looking down -->
  <g stroke="#1f3a1a" stroke-linecap="round">
    <!-- left eye -->
    <ellipse cx="11.7" cy="13.5" rx="3.4" ry="2.9" fill="#ffffff" stroke-width="1.2"/>
    <path d="M 9.6 12.6 Q 11.7 11.8 13.8 12.6" fill="none" stroke-width="1.1"/>
    <circle cx="11.7" cy="14.6" r="1.8" fill="#1f3a1a" stroke="none"/>
    <circle cx="11.1" cy="13.9" r="0.6" fill="#ffffff" stroke="none"/>
    <!-- right eye -->
    <ellipse cx="20.3" cy="13.5" rx="3.4" ry="2.9" fill="#ffffff" stroke-width="1.2"/>
    <path d="M 18.2 12.6 Q 20.3 11.8 22.4 12.6" fill="none" stroke-width="1.1"/>
    <circle cx="20.3" cy="14.6" r="1.8" fill="#1f3a1a" stroke="none"/>
    <circle cx="19.7" cy="13.9" r="0.6" fill="#ffffff" stroke="none"/>
  </g>
</svg>
