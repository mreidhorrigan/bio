<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Matt Horrigan</title>
  <meta name="description" content="Matt Horrigan, communication scholar: a walkable isometric homepage.">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <style>html,body{margin:0;height:100%;overflow:hidden;background:#05060e;color:#fff;font-family:system-ui,sans-serif}
    noscript .ns{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;background:#0c0f1a}
    noscript a{color:#7afcff}</style>
  <!-- ROOT-INSTALL config: assets live right here (base ""), no gallery back-link,
       the old homepage is the plain fallback. This is exactly what bio/index.html
       would set once promoted. -->
  <script>
    window.MH_SITE = { base: "", back: "", plain: "classic.html" };
    window.MH_AUTOSTART = false;
  </script>
</head>
<body>
  <noscript><div class="ns"><p>This walkable homepage needs JavaScript.<br>
    Read the <a href="classic.html">standard site</a> instead.</p></div></noscript>

  <script src="engine.js" defer></script>
  <script src="content.js" defer></script>
  <script src="ecology.js" defer></script>
  <script src="buildings.js" defer></script>
  <script src="theme-technocute.js" defer></script>
  <script src="theme-technurture.js" defer></script>
  <script src="theme-technoscure.js" defer></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var ids = (window.MH_ISO ? window.MH_ISO.themes() : []).map(function (t) { return t.id; });
      var want = null; try { want = new URLSearchParams(location.search).get("skin"); } catch (e) {}
      // The default landing skin follows the visitor's LOCAL time of day (business hours →
      // bureaucore, daylight → technurture, late night → gloomthmaxx). See engine.js
      // timeDefaultSkin(). An explicit ?skin= still overrides it.
      var pick = (ids.indexOf(want) >= 0 && want) || window.MH_ISO.timeDefaultSkin();
      window.MH_ISO.start(pick);
    });
  </script>
</body>
</html>
